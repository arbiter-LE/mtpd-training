<svg width="100%" viewBox="0 0 680 700" role="img" xmlns="http://www.w3.org/2000/svg">
<title>How Arbiter LE works — from signature to completion</title>
<desc>A branded five-step explainer in Arbiter LE's navy and gold style: sign the agreement, your own secure project, built from your policies, officers train, you see completion.</desc>
<defs>
<pattern id="dots2" width="22" height="22" patternUnits="userSpaceOnUse"><circle cx="2" cy="2" r="1" fill="#1e3448" opacity="0.55"/></pattern>
</defs>
<rect x="0" y="0" width="680" height="700" fill="#0a1828"/>
<rect x="0" y="0" width="680" height="210" fill="url(#dots2)"/>
<rect x="0" y="0" width="680" height="5" fill="#c8902a"/>

<path d="M42 56 L80 56 L80 78 Q80 92 61 101 Q42 92 42 78 Z" fill="none" stroke="#d4a02e" stroke-width="1.5"/>
<line x1="49" y1="74" x2="73" y2="74" stroke="#d4a02e" stroke-width="1.2"/>
<path d="M55 82 L61 88 L67 82" fill="none" stroke="#d4a02e" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
<text x="100" y="74" font-family="Helvetica,Arial,sans-serif" font-size="29" font-weight="700" letter-spacing="3" fill="#e8f0f6">ARBITER LE</text>
<text x="102" y="93" font-family="Helvetica,Arial,sans-serif" font-size="10.5" font-weight="600" letter-spacing="4" fill="#d4a02e">LAW ENFORCEMENT TRAINING</text>

<text x="42" y="146" font-family="Helvetica,Arial,sans-serif" font-size="11" font-weight="700" letter-spacing="3.5" fill="#d4a02e">FROM SIGNATURE TO COMPLETION</text>
<text x="42" y="178" font-family="Helvetica,Arial,sans-serif" font-size="23" font-weight="700" letter-spacing="1.5" fill="#e8f0f6">HOW ARBITER LE WORKS</text>
<line x1="42" y1="202" x2="638" y2="202" stroke="#1e3448" stroke-width="1"/>

<line x1="70" y1="250" x2="70" y2="600" stroke="#1e3448" stroke-width="1.5"/>

<circle cx="70" cy="250" r="16" fill="#11202f" stroke="#c8902a" stroke-width="1.5"/>
<text x="70" y="255" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="13" font-weight="700" fill="#e8b94a">1</text>
<text x="104" y="246" font-family="Helvetica,Arial,sans-serif" font-size="14" font-weight="700" letter-spacing="1.5" fill="#e8b94a">SIGN THE AGREEMENT</text>
<text x="104" y="267" font-family="Helvetica,Arial,sans-serif" font-size="12.5" fill="#b8cdde">Your department comes onboard with a straightforward service agreement.</text>

<circle cx="70" cy="338" r="16" fill="#11202f" stroke="#c8902a" stroke-width="1.5"/>
<text x="70" y="343" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="13" font-weight="700" fill="#e8b94a">2</text>
<text x="104" y="334" font-family="Helvetica,Arial,sans-serif" font-size="14" font-weight="700" letter-spacing="1.5" fill="#e8b94a">YOUR OWN SECURE PROJECT</text>
<text x="104" y="355" font-family="Helvetica,Arial,sans-serif" font-size="12.5" fill="#b8cdde">We stand up an isolated database — your officer data never<tspan x="104" dy="18">mixes with another agency's.</tspan></text>

<circle cx="70" cy="438" r="16" fill="#11202f" stroke="#c8902a" stroke-width="1.5"/>
<text x="70" y="443" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="13" font-weight="700" fill="#e8b94a">3</text>
<text x="104" y="434" font-family="Helvetica,Arial,sans-serif" font-size="14" font-weight="700" letter-spacing="1.5" fill="#e8b94a">BUILT FROM YOUR POLICIES</text>
<text x="104" y="455" font-family="Helvetica,Arial,sans-serif" font-size="12.5" fill="#b8cdde">Modules are authored from your general orders — quoted verbatim —<tspan x="104" dy="18">and set on your real roads and jurisdiction.</tspan></text>

<circle cx="70" cy="526" r="16" fill="#11202f" stroke="#c8902a" stroke-width="1.5"/>
<text x="70" y="531" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="13" font-weight="700" fill="#e8b94a">4</text>
<text x="104" y="522" font-family="Helvetica,Arial,sans-serif" font-size="14" font-weight="700" letter-spacing="1.5" fill="#e8b94a">OFFICERS TRAIN</text>
<text x="104" y="543" font-family="Helvetica,Arial,sans-serif" font-size="12.5" fill="#b8cdde">Officers work scenario-based modules from any device, on a schedule you set.</text>

<circle cx="70" cy="600" r="16" fill="#11202f" stroke="#c8902a" stroke-width="1.5"/>
<text x="70" y="605" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="13" font-weight="700" fill="#e8b94a">5</text>
<text x="104" y="596" font-family="Helvetica,Arial,sans-serif" font-size="14" font-weight="700" letter-spacing="1.5" fill="#e8b94a">YOU SEE COMPLETION</text>
<text x="104" y="617" font-family="Helvetica,Arial,sans-serif" font-size="12.5" fill="#b8cdde">Track progress across the roster, with supervisor-level visibility.</text>

<line x1="42" y1="652" x2="638" y2="652" stroke="#1e3448" stroke-width="1"/>
<text x="42" y="678" font-family="Helvetica,Arial,sans-serif" font-size="12" font-weight="700" letter-spacing="2.5" fill="#d4a02e">ARBITERLE.COM</text>
<text x="638" y="678" text-anchor="end" font-family="Helvetica,Arial,sans-serif" font-size="11" letter-spacing="0.5" fill="#7f9bb2">Built for your department. Owned by your department.</text>
</svg>
